name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Ruff check
        run: uv run ruff check pynenc_rustvello/ tests/

      - name: Ruff format check
        run: uv run ruff format --check pynenc_rustvello/ tests/

      - name: Mypy
        run: uv run mypy pynenc_rustvello/
