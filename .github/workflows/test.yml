name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: uv sync --group tests

      - name: Run unit tests with coverage
        run: uv run coverage run -m pytest tests/unit -q

      - name: Print coverage report
        run: uv run coverage report

      - name: Generate coverage HTML
        run: uv run coverage html --show-contexts --title "Unit Test Coverage for ${{ github.sha }}"

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-unit-${{ matrix.python-version }}
          path: htmlcov

      - name: Prepare coverage file for upload
        run: |
          cp .coverage coverage.unit
          ls -la coverage.unit

      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-unit-${{ matrix.python-version }}
          path: coverage.unit

  integration-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: uv sync --group tests

      - name: Run integration tests with coverage
        run: uv run coverage run -m pytest tests/integration -q

      - name: Print coverage report
        run: uv run coverage report

      - name: Generate coverage HTML
        run: uv run coverage html --show-contexts --title "Integration Test Coverage for ${{ github.sha }}"

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-integration-${{ matrix.python-version }}
          path: htmlcov

      - name: Prepare coverage file for upload
        run: |
          cp .coverage coverage.integration
          ls -la coverage.integration

      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-integration-${{ matrix.python-version }}
          path: coverage.integration
